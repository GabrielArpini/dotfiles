source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

# Background — blurred, dimmed
background {
    monitor =
    path = ~/.config/omarchy/current/background
    color = rgba(15,14,12,1.0)
    blur_passes = 2
    blur_size = 6
    brightness = 0.5
    contrast = 0.8
}

animations {
    enabled = true
    animation = global, 1, 6, default
}

# Time — the main character
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(196,180,138,1.0)
    font_size = 120
    font_family = VictorMono Nerd Font Bold
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 0
}

# Day + date — dim, barely there
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A   %B %-d')"
    color = rgba(90,78,56,1.0)
    font_size = 20
    font_family = VictorMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
    shadow_passes = 0
}

# Password input — sharp corners, minimal
input-field {
    monitor =
    size = 380, 52
    position = 0, -80
    halign = center
    valign = center

    inner_color = rgba(15,14,12,0.0)
    outer_color = rgba(42,38,32,1.0)
    outline_thickness = 1

    font_family = VictorMono Nerd Font
    font_color = rgba(196,180,138,1.0)
    font_size = 16

    placeholder_text = <span foreground="##3a3028">···</span>
    check_color = rgba(212,168,90,1.0)
    fail_color = rgba(168,72,72,1.0)
    fail_text = <i><span foreground="##a84848">$FAIL ($ATTEMPTS)</span></i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
    capslock_color = rgba(200,147,74,1.0)
}

auth {
    fingerprint:enabled = false
}
